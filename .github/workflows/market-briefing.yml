name: 📊 Market Briefing Auto-Post

on:
  schedule:
    # ── 정시 실행 (KST 08:00~17:00, 월~금) ──
    - cron: '0 23 * * 0-4'    # KST 월~금 08:00 (UTC 일~목 23:00)
    - cron: '0 0-8 * * 1-5'   # KST 월~금 09:00~17:00 (UTC 월~금 00:00~08:00)
    # ── 백업 실행 (정시 누락 대비, 30분 오프셋) ──
    - cron: '30 23 * * 0-4'   # KST 월~금 08:30 백업
    - cron: '30 0-8 * * 1-5'  # KST 월~금 09:30~17:30 백업
  workflow_dispatch: # 수동 실행 가능

jobs:
  briefing:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'scripts/requirements.txt'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r scripts/requirements.txt

      - name: 🚀 Run market briefing
        run: python scripts/web.py
