name: 📊 Market Briefing Auto-Post

on:
  schedule:
    # KST 08:00~16:00 (1시간 간격, 월~금)
    # KST 08:00 = UTC 전일 23:00 → 일~목 실행 (결과적으로 월~금 아침)
    - cron: '0 23 * * 0-4'   # KST 월~금 08:00 (UTC 일~목 23:00)
    - cron: '0 0-7 * * 1-5'  # KST 월~금 09:00~16:00 (UTC 00:00~07:00)
  workflow_dispatch: # 수동 실행 가능

jobs:
  briefing:
    runs-on: ubuntu-latest
    # 한국 시간대 설정
    env:
      TZ: Asia/Seoul
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'scripts/requirements.txt'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r scripts/requirements.txt

      - name: 🚀 Run market briefing
        run: python scripts/web.py
